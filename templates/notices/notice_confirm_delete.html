{% extends "base.html" %} {% block content %}
<h2>Delete Notice</h2>

<p>Are you sure you want to delete this notice?</p>

<h3>{{ notice.title }}</h3>
<p>{{ notice.body }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'notices:detail' notice.pk %}">Cancel</a> {% endblock %}
